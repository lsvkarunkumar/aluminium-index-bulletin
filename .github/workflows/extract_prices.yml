name: Daily SMM Metals Price Extract

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run extractor
        env:
          SMM_EMAIL: ${{ secrets.SMM_EMAIL }}
          SMM_PASSWORD: ${{ secrets.SMM_PASSWORD }}
        run: |
          python extract_prices.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git commit -m "Daily SMM authenticated price update" || echo "No changes"
          git push
