name: Extract Prices Test

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SMM_EMAIL: ${{ secrets.SMM_EMAIL }}
  SMM_PASSWORD: ${{ secrets.SMM_PASSWORD }}

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright

      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run extractor
        run: python extract_prices.py

      - name: Commit capture outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/latest_dashboard_capture.csv data/latest_granular_capture.csv data/debug_visible_text.txt
          git diff --cached --quiet || git commit -m "Capture SMM dashboard and granular data"
          git push
