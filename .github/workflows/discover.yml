name: Discover Metal Titles

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas playwright
          python -m playwright install chromium

      - name: Run discovery
        run: python discover_titles.py

      - name: Commit discovered file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/discovered_index_list.csv
          git diff --cached --quiet || git commit -m "Browser discovered Metal.com index titles"
          git push
