name: Export Excel Pink Sheet

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Export Excel
        run: python export_to_excel.py

      - name: Commit Excel file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/pink_sheet.xlsx
          git diff --cached --quiet || git commit -m "Export formatted Excel pink sheet"
          git push
