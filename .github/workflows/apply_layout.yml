name: Apply Layout to Master

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Apply layout
        run: python apply_layout_to_master.py

      - name: Commit final master
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/master_index_final.csv
          git diff --cached --quiet || git commit -m "Final structured master index"
          git push
