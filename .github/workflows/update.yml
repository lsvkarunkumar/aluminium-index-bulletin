name: Daily Metal Capture

on:
  schedule:
    - cron: "0 7 * * *"   # 08:00 Lagos time
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run daily capture
        run: python run_daily_capture.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/pink_sheet.csv
          git diff --cached --quiet || git commit -m "Daily aluminium index capture"
          git push
